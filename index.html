<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form 15 - Kiểm soát test bền</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --danger: #b91c1c;
      --ok: #047857;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: min(1400px, 96vw);
      margin: 24px auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.06);
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .wrap.frame-ok {
      border-color: #86efac;
      box-shadow: 0 8px 28px rgba(22, 163, 74, 0.18);
    }
    .wrap.frame-refreshing {
      border-color: #fca5a5;
      box-shadow: 0 8px 28px rgba(220, 38, 38, 0.2);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .topbar-lead {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      min-width: 0;
    }
    .lab-preview-link-btn {
      border: none;
      background: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
    }
    .lab-preview-link-btn:hover {
      color: #1d4ed8;
    }
    .lab-preview-link-btn:focus-visible {
      outline: 2px solid #93c5fd;
      outline-offset: 2px;
      border-radius: 4px;
    }
    .lab-preview-link-btn[hidden] {
      display: none !important;
    }
    .lab-preview-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10020;
      padding: 16px;
    }
    .lab-preview-modal.open {
      display: flex;
    }
    .lab-preview-card {
      width: min(1100px, 98vw);
      max-height: 94vh;
      overflow: auto;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.22);
      padding: 14px 16px;
    }
    .lab-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .lab-preview-title {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
    }
    .lab-preview-close {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #334155;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .lab-preview-body {
      text-align: center;
      line-height: 0;
    }
    .lab-preview-img {
      max-width: 100%;
      height: auto;
      max-height: min(82vh, 880px);
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: linear-gradient(180deg, #fef3c7 0%, #fde68a 100%);
      color: #7c2d12;
      border: 2px solid #fb923c;
      box-shadow: 0 0 0 2px rgba(251, 146, 60, 0.18);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 18px;
      text-align: center;
      vertical-align: middle;
      font-weight: 700;
      margin-bottom: 10px;
      white-space: nowrap;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.3;
    }
    p {
      margin: 8px 0 0;
      color: var(--muted);
    }
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      background: #f8fafc;
      white-space: nowrap;
    }
    .source-badge.source-snapshot {
      border-color: #86efac;
      background: #ecfdf5;
      color: #166534;
    }
    .source-badge.source-fallback {
      border-color: #fca5a5;
      background: #fef2f2;
      color: #991b1b;
    }
    .source-badge.source-scan {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
    }
    .ttl-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      background: #f8fafc;
      white-space: nowrap;
    }
    .ttl-badge.ttl-fresh {
      border-color: #86efac;
      background: #ecfdf5;
      color: #166534;
    }
    .ttl-badge.ttl-warn {
      border-color: #fde68a;
      background: #fffbeb;
      color: #92400e;
    }
    .ttl-badge.ttl-expired {
      border-color: #fca5a5;
      background: #fef2f2;
      color: #991b1b;
    }
    .btn {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 14px;
      text-decoration: none;
      color: #0f172a;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:hover { filter: brightness(0.98); }
    .btn-primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .btn-force-scan {
      background: transparent;
      border: none;
      color: #9a3412;
      text-decoration: underline;
      text-underline-offset: 2px;
      padding: 0;
      border-radius: 0;
      font-weight: 600;
    }
    .btn-force-scan:hover {
      color: #7c2d12;
      background: transparent;
      filter: none;
    }
    #ce-stats-btn,
    #ce-giao-mau-stats-btn,
    #dur-stats-btn {
      border: 2px solid #15803d;
      background: #f0fdf4;
      color: #14532d;
      font-size: 16px;
      font-weight: 900;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      text-shadow: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      box-shadow: 0 0 0 1px rgba(21, 128, 61, 0.15);
    }
    #ce-stats-btn:hover,
    #ce-giao-mau-stats-btn:hover,
    #dur-stats-btn:hover {
      background: #dcfce7;
      border-color: #166534;
    }
    .module-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }
    .module-tab {
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #334155;
      border-radius: 999px;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .module-tab:hover {
      background: #f1f5f9;
    }
    .module-tab.active {
      background: #fff7ed;
      border-color: #fb923c;
      color: #c2410c;
    }
    .module-tab:focus-visible {
      outline: 2px solid #fb923c;
      outline-offset: 2px;
    }
    .app-module-panel[hidden] {
      display: none !important;
    }
    .ce-review-intro {
      font-size: 14px;
      line-height: 1.55;
      color: #334155;
      margin: 0 0 12px;
    }
    .ce-review-meta.muted {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
    }
    .ce-review-meta code {
      font-size: 12px;
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .ce-table-meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .ce-empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: #f8fafc;
    }
    .p3-embed-fallback {
      text-align: left;
      max-width: 720px;
      margin-top: 12px;
    }
    .p3-embed-fallback code {
      font-size: 12px;
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .ce-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      max-height: min(70vh, 720px);
      overflow-y: auto;
      overflow-anchor: none;
    }
    .ce-review-table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      font-size: 15px; /* ~1.2x để dễ đọc hơn */
      color: #020617;  /* đen rõ hơn */
      min-width: 1820px;
    }
    .ce-review-table th,
    .ce-review-table td {
      border-bottom: 1.5px solid #94a3b8;
      border-right: 1.5px solid #cbd5e1;
      padding: 10px 10px;
      text-align: left;
      vertical-align: top;
      white-space: normal;
      line-height: 1.5;
      overflow-wrap: anywhere;
      word-break: break-word;
      color: #020617;
    }
    .ce-review-table th:last-child,
    .ce-review-table td:last-child {
      border-right: none;
    }
    .ce-review-table thead th {
      position: sticky;
      top: 0;
      background: #f1f5f9;
      font-weight: 700;
      color: #334155;
      z-index: 1;
      box-shadow: 0 1px 0 var(--line);
      hyphens: none;
    }
    .ce-review-table tbody tr:hover {
      background: #fafafa;
    }
    .ce-review-table tbody tr.ce-row-selected td {
      background: #fff7cc !important;
      box-shadow: inset 0 0 0 1px #f59e0b;
    }
    /* CE: luôn wrap-text để không mất chữ */
    .ce-review-table td.ce-mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    /* Bản đồ độ rộng theo thứ tự 20 cột CE hiện tại */
    .ce-review-table th:nth-child(1),  .ce-review-table td:nth-child(1)  { width: 8%; }   /* Mã tác vụ */
    .ce-review-table th:nth-child(2),  .ce-review-table td:nth-child(2)  { width: 12%; }  /* Task name */
    .ce-review-table th:nth-child(3),  .ce-review-table td:nth-child(3)  { width: 7%; }   /* Mã */
    .ce-review-table th:nth-child(4),  .ce-review-table td:nth-child(4)  { width: 8%; }   /* Assignee */
    .ce-review-table th:nth-child(5),  .ce-review-table td:nth-child(5)  { width: 9%; }   /* Ngày hoàn thành thực tế */
    .ce-review-table th:nth-child(6),  .ce-review-table td:nth-child(6)  { width: 8%; }   /* Mã báo cáo */
    .ce-review-table th:nth-child(7),  .ce-review-table td:nth-child(7)  { width: 9%; }   /* Link BCexcel */
    .ce-review-table th:nth-child(8),  .ce-review-table td:nth-child(8)  { width: 9%; }   /* JiraLinkRequest */
    .ce-review-table th:nth-child(9),  .ce-review-table td:nth-child(9)  { width: 7%; }   /* Mã KOI */
    .ce-review-table th:nth-child(10), .ce-review-table td:nth-child(10) { width: 11%; }  /* Kết luận */
    .ce-review-table th:nth-child(11), .ce-review-table td:nth-child(11) { width: 11%; }  /* Kết luận trang bìa */
    .ce-review-table th:nth-child(12), .ce-review-table td:nth-child(12) { width: 9%; }   /* Kết quả */
    .ce-review-table th:nth-child(13), .ce-review-table td:nth-child(13) { width: 9%; }   /* Trạng thái cũ */
    .ce-review-table th:nth-child(14), .ce-review-table td:nth-child(14) { width: 10%; }  /* Trạng thái khai báo CE */
    .ce-review-table th:nth-child(15), .ce-review-table td:nth-child(15) { width: 12%; }  /* Lịch sử thay đổi */
    .ce-review-table th:nth-child(16), .ce-review-table td:nth-child(16) { width: 20%; }  /* Ghi chú */
    .ce-review-table th:nth-child(17), .ce-review-table td:nth-child(17) { width: 10%; }  /* Link KOI */
    .ce-review-table th:nth-child(18), .ce-review-table td:nth-child(18) { width: 9%; }   /* Lịch sử khai báo */
    .ce-review-table th:nth-child(19), .ce-review-table td:nth-child(19) { width: 18%; }  /* Khai báo giao mẫu */
    .ce-review-table th:nth-child(20), .ce-review-table td:nth-child(20) { width: 9%; }   /* Lịch sử khai báo giao mẫu */

    /* Vùng cột người dùng cần khai báo CE (bôi xanh lá để phân biệt) */
    .ce-review-table th:nth-child(16),
    .ce-review-table th:nth-child(17),
    .ce-review-table th:nth-child(18),
    .ce-review-table th:nth-child(19),
    .ce-review-table th:nth-child(20) {
      background: #d1fae5;
      color: #064e3b;
      font-weight: 700;
    }
    .ce-review-table td:nth-child(16),
    .ce-review-table td:nth-child(17),
    .ce-review-table td:nth-child(18),
    .ce-review-table td:nth-child(19),
    .ce-review-table td:nth-child(20) {
      background: #ecfdf5;
    }
    /* Override riêng cho 2 cột giao mẫu để tách hẳn khỏi nhóm CE xanh. */
    .ce-review-table th:nth-child(19),
    .ce-review-table th:nth-child(20) {
      background: #f3e8ff;
      color: #6b21a8;
      border-top: 2px solid #c084fc;
    }
    .ce-review-table td:nth-child(19),
    .ce-review-table td:nth-child(20) {
      background: #faf5ff;
      border-left: 2px solid #d8b4fe;
    }

    .ce-review-table th:nth-child(14),
    .ce-review-table th:nth-child(15) {
      background: #dbeafe;
      color: #1e3a8a;
      font-weight: 700;
    }
    .ce-review-table td:nth-child(14),
    .ce-review-table td:nth-child(15) {
      background: #eff6ff;
    }

    .ce-review-table th:nth-child(15),
    .ce-review-table td:nth-child(15),
    .ce-review-table th:nth-child(16),
    .ce-review-table td:nth-child(16),
    .ce-review-table th:nth-child(17),
    .ce-review-table td:nth-child(17) {
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .ce-review-table th:nth-child(18),
    .ce-review-table td:nth-child(18) {
      white-space: normal;
      font-size: 11px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .ce-review-table th:nth-child(19),
    .ce-review-table td:nth-child(19),
    .ce-review-table th:nth-child(20),
    .ce-review-table td:nth-child(20) {
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .ce-review-table td a,
    .ce-review-table th a {
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .ce-review-table td.ce-trang-thai-cu-cell {
      vertical-align: middle;
    }
    /* Ẩn mặc định nhóm cột phụ; bấm "+" để hiện tất cả cột ẩn */
    .ce-review-table.ce-hide-optional-cols th:nth-child(1),
    .ce-review-table.ce-hide-optional-cols td:nth-child(1),
    .ce-review-table.ce-hide-optional-cols th:nth-child(7),
    .ce-review-table.ce-hide-optional-cols td:nth-child(7),
    .ce-review-table.ce-hide-optional-cols th:nth-child(8),
    .ce-review-table.ce-hide-optional-cols td:nth-child(8),
    .ce-review-table.ce-hide-optional-cols th:nth-child(9),
    .ce-review-table.ce-hide-optional-cols td:nth-child(9),
    .ce-review-table.ce-hide-optional-cols th:nth-child(10),
    .ce-review-table.ce-hide-optional-cols td:nth-child(10),
    .ce-review-table.ce-hide-optional-cols th:nth-child(11),
    .ce-review-table.ce-hide-optional-cols td:nth-child(11),
    .ce-review-table.ce-hide-optional-cols th:nth-child(13),
    .ce-review-table.ce-hide-optional-cols td:nth-child(13),
    .ce-review-table.ce-hide-optional-cols th:nth-child(15),
    .ce-review-table.ce-hide-optional-cols td:nth-child(15) {
      display: none;
    }
    /* CE mặc định (ẩn cột phụ): khóa width cố định, tránh auto-scale cột hiển thị. */
    .ce-review-table.ce-hide-optional-cols {
      width: 2299px;
      min-width: 2299px;
    }
    .ce-review-table.ce-hide-optional-cols th:nth-child(2),
    .ce-review-table.ce-hide-optional-cols td:nth-child(2) { width: 218px; }
    .ce-review-table.ce-hide-optional-cols th:nth-child(3),
    .ce-review-table.ce-hide-optional-cols td:nth-child(3) { width: 127px; }
    .ce-review-table.ce-hide-optional-cols th:nth-child(4),
    .ce-review-table.ce-hide-optional-cols td:nth-child(4) { width: 145px; }
    .ce-review-table.ce-hide-optional-cols th:nth-child(5),
    .ce-review-table.ce-hide-optional-cols td:nth-child(5) { width: 164px; }
    .ce-review-table.ce-hide-optional-cols th:nth-child(6),
    .ce-review-table.ce-hide-optional-cols td:nth-child(6) { width: 145px; }
    .ce-review-table.ce-hide-optional-cols th:nth-child(12),
    .ce-review-table.ce-hide-optional-cols td:nth-child(12) { width: 164px; }
    .ce-review-table.ce-hide-optional-cols th:nth-child(14),
    .ce-review-table.ce-hide-optional-cols td:nth-child(14) { width: 182px; }
    .ce-review-table.ce-hide-optional-cols th:nth-child(16),
    .ce-review-table.ce-hide-optional-cols td:nth-child(16) { width: 364px; }
    .ce-review-table.ce-hide-optional-cols th:nth-child(17),
    .ce-review-table.ce-hide-optional-cols td:nth-child(17) { width: 182px; }
    .ce-review-table.ce-hide-optional-cols th:nth-child(18),
    .ce-review-table.ce-hide-optional-cols td:nth-child(18) { width: 164px; }
    .ce-review-table.ce-hide-optional-cols th:nth-child(19),
    .ce-review-table.ce-hide-optional-cols td:nth-child(19) { width: 280px; }
    .ce-review-table.ce-hide-optional-cols th:nth-child(20),
    .ce-review-table.ce-hide-optional-cols td:nth-child(20) { width: 164px; }
    .ce-stats-table {
      min-width: 0;
      table-layout: fixed;
      font-size: 13px;
    }
    .ce-stats-table th,
    .ce-stats-table td {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }
    .ce-stats-table th:nth-child(1),
    .ce-stats-table td:nth-child(1) {
      width: 24%;
    }
    .ce-stats-table th:nth-child(3),
    .ce-stats-table td:nth-child(3),
    .ce-stats-table th:nth-child(4),
    .ce-stats-table td:nth-child(4),
    .ce-stats-table th:nth-child(5),
    .ce-stats-table td:nth-child(5) {
      width: 14%;
    }
    .ce-stats-table th:nth-child(2),
    .ce-stats-table td:nth-child(2) {
      width: 10%;
      font-weight: 700;
    }
    .ce-stats-table th:nth-child(6),
    .ce-stats-table td:nth-child(6) {
      width: 24%;
      font-weight: 800;
      color: #065f46;
      background: #ecfdf5;
    }
    .ce-stats-table th:nth-child(6) {
      background: #d1fae5;
      color: #064e3b;
    }
    /* Thống kê Test bền: chỉnh độ rộng riêng theo yêu cầu. */
    .dur-stats-table th:nth-child(1),
    .dur-stats-table td:nth-child(1) { width: 22%; } /* Assignee: giảm ~1.1 lần */
    .dur-stats-table th:nth-child(2),

      top: 0;

      height: 100%;

      left: 0;
      top: 0;

      height: 100%;

      pointer-events: none;

      height: 100%;

      border-radius: 6px;
      box-shadow:

  <script>
    (function () {
      function encSeg(folder) {
        return String(folder || "The_P3")
          .split("/")
          .filter(Boolean)
          .map(function (s) {
            return encodeURIComponent(s);
          })
          .join("/");
      }
      function p3FoldersToTry() {
        var cfg = window.Form15Config && window.Form15Config.CONFIG && window.Form15Config.CONFIG.p3Embed;
        var ex = cfg && String(cfg.theP3Folder || "").trim();
        if (ex) return [ex];
        return ["The_P3", "the_P3", "the P3"];
      }
      (async function () {
        try {
          var dir = new URL(".", location.href).href;
          var path = new URL(dir).pathname || "";
          var nested = /\/form15-frontend-main\/?$/i.test(path);
          var folders = p3FoldersToTry();
          var chosen = null;
          for (var i = 0; i < folders.length; i++) {
            var f = encSeg(folders[i]);
            var base = new URL((nested ? "../" : "./") + f + "/", dir).href;
            var testUrl = new URL("assets/css/base.css", base).href;
            try {
              var r = await fetch(testUrl, { method: "HEAD", cache: "no-store" });
              if (r.ok) {
                chosen = base;
                break;
              }
            } catch (e) {}
          }
          if (!chosen) {
            chosen = new URL((nested ? "../" : "./") + encSeg("The_P3") + "/", dir).href;
          }
          function injectCss(relPath) {
            var l = document.createElement("link");
            l.rel = "stylesheet";
            l.href = new URL(relPath, chosen).href;
            document.head.appendChild(l);
          }
          injectCss("assets/css/base.css");
          injectCss("assets/css/p3.css");
        } catch (e) {
          console.warn("Form15 P3 CSS:", e);
        }
      })();
    })();
  </script>
